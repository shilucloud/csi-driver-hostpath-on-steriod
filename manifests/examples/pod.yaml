apiVersion: v1
kind: Pod
metadata:
  name: hposvolume-pod
  labels:
    app: csi-driver-hostpath-on-steriod
    csi-driver-example: "true"
spec:
  containers:
    - name: con1
      image: nginx
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: demo
